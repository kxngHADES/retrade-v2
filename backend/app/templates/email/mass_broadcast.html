<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <style>
        body { font-family: sans-serif; line-height: 1.6; color: #333; margin: 0; padding: 0; }
        .container { max-width: 600px; margin: 20px auto; border: 1px solid #eee; border-radius: 8px; overflow: hidden; }
        .header { background-color: #FF6B00; color: #ffffff; padding: 20px; text-align: center; }
        .content { padding: 30px; background-color: #ffffff; }
        .footer { background-color: #f8f9fa; color: #6c757d; padding: 20px; text-align: center; font-size: 12px; }
        h1, h2 { color: #FF6B00; }
        ul { padding-left: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h2 style="color: #ffffff; margin: 0;">ReTrade Updates</h2>
        </div>
        <div class="content">
            $content
        </div>
        <div class="footer">
            &copy; $year ReTrade. All rights reserved.<br>
            You are receiving this because you're a registered member.
        </div>
    </div>
</body>
</html>
